<script>
// ── Supabase 設定 ──
// OneSignal 推播輔助
const OS_APP_ID = "d76da6d5-8058-40dc-acd5-cc6c5c55ec98";
const OS_API_KEY = "os_v2_app_25w2nvmalbanzlgvzrwfyvpmtdemxnrvsvpukcemyq34xmr4gwbammw2wclrvpdobawlmkcvpkcjem2dykaflggiwzvysl77eflzura";

async function sendPushToRd(rdId, title, body) {
  // 從 Supabase 查 RD 的 OneSignal player ID
  try {
    const GET_HDRS = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };
    const res = await fetch(`${SB_URL}/rest/v1/cd?key=eq.onesignal_rd_${rdId}&select=value`, { headers: GET_HDRS });
    if (!res.ok) return;
    const rows = await res.json();
    const playerId = rows[0]?.value?.playerId;
    if (!playerId) return;
    await fetch('https://api.onesignal.com/notifications', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Key ${OS_API_KEY}` },
      body: JSON.stringify({
        app_id: OS_APP_ID,
        include_subscription_ids: [playerId],
        headings: { en: title, zh: title },
        contents: { en: body, zh: body },
        url: 'https://codare2026.github.io/codare-rd/'
      })
    });
  } catch(e) { console.warn('Push failed:', e.message); }
}

const SB_URL  = 'https://iqfnbwyjehwdbxptquyr.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlxZm5id3lqZWh3ZGJ4cHRxdXlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3ODU5MjcsImV4cCI6MjA5MjM2MTkyN30.F5XSv6TKkJfek8bLmYsgvYgD7cnLGLirpNwC7SqbNDY';
const SB_HDRS = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' };

const _cache = {};
let _sbReady = true;
let _realtimeChannel = null;

// ── 讀取（先 cache → localStorage，背景同步） ──
function gs(key) {
  if (_cache[key] !== undefined) return _cache[key];
  try { const v = localStorage.getItem('cd_' + key); return v ? JSON.parse(v) : null; } catch { return null; }
}

// ── 寫入（cache + localStorage + Supabase 非同步） ──
function ss(key, val) {
  _cache[key] = val;
  try { if (val === null) localStorage.removeItem('cd_' + key); else localStorage.setItem('cd_' + key, JSON.stringify(val)); } catch {}
  sbWrite(key, val);
}

async function sbWrite(key, val) {
  try {
    if (val === null) {
      await fetch(`${SB_URL}/rest/v1/cd?key=eq.${encodeURIComponent(key)}`, { method: 'DELETE', headers: SB_HDRS });
    } else {
      // 使用 upsert（merge-duplicates）確保跨裝置同步
      await fetch(`${SB_URL}/rest/v1/cd`, {
        method: 'POST',
        headers: { ...SB_HDRS, 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify({ key, value: val, updated_at: new Date().toISOString() })
      });
    }
  } catch(e) { console.warn('Supabase write error:', e.message); }
}

// ── 上傳圖片到 Supabase Storage（取代 base64 存資料庫）──
async function uploadPhoto(file, userId, day, mealKey) {
  const ext = file.type === 'image/png' ? 'png' : 'jpg';
  const path = `${userId}/${day.replace(/\//g,'_')}/${mealKey}_${Date.now()}.${ext}`;
  const res = await fetch(`${SB_URL}/storage/v1/object/photos/${path}`, {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': file.type, 'x-upsert': 'true' },
    body: file
  });
  if (!res.ok) throw new Error('上傳失敗');
  return `${SB_URL}/storage/v1/object/public/photos/${path}`;
}

// ── 從 localStorage 預載 cache（瞬間啟動）──
function preloadLocalCache() {
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('cd_')) {
        const k = key.slice(3);
        if (_cache[k] === undefined) {
          try { _cache[k] = JSON.parse(localStorage.getItem(key)); } catch {}
        }
      }
    }
  } catch(e) {}
}

// ── warmCache：增量同步，節省流量 ──
async function warmCache(userId) {
  preloadLocalCache();
  if (!userId) return;

  const GET_HDRS = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

  const safeGet = async (url) => {
    try {
      const res = await Promise.race([
        fetch(url, { headers: GET_HDRS }),
        new Promise((_, r) => setTimeout(() => r(new Error('t')), 6000))
      ]);
      if (!res.ok) return [];
      const data = await res.json();
      return Array.isArray(data) ? data : [];
    } catch(e) { return []; }
  };

  const lastSyncKey = 'cd_last_sync_' + userId;
  const lastSync = localStorage.getItem(lastSyncKey);
  const now = new Date().toISOString();

  let rows;
  if (lastSync) {
    // 增量：只抓上次同步後有變動的（例如營養師新增回覆）
    rows = await safeGet(
      `${SB_URL}/rest/v1/cd?updated_at=gt.${encodeURIComponent(lastSync)}&key=ilike.%25${userId}%25&select=key,value&limit=200&order=updated_at`
    );
  } else {
    // 第一次：抓此學員所有資料
    rows = await safeGet(
      `${SB_URL}/rest/v1/cd?key=ilike.%25${userId}%25&select=key,value&limit=300`
    );
  }

  rows.forEach(({ key, value }) => {
    if (!key) return;
    _cache[key] = value;
    try { localStorage.setItem('cd_' + key, JSON.stringify(value)); } catch {}
  });

  if (rows.length >= 0) localStorage.setItem(lastSyncKey, now);
}

// ── bgSyncClient：背景更新，不阻塞 UI ──
function bgSyncClient(userId) {
  if (!userId) return;
  setTimeout(async () => {
    try { await warmCache(userId); updateInboxBadge(); } catch(e) {}
  }, 300);
}

// ── Realtime 監聽（Supabase Realtime）──
function updateFoodStatusDots(userId) {
  // 只更新首頁日期格的紅點/綠勾，不重新渲染整頁
  const days = buildCourseDates(currentUser.start, currentUser.end);
  days.forEach(day => {
    const food = gs(`food_${userId}_${day}`);
    if (!food) return;
    const dotEl = document.getElementById(`day-dot-${day.replace(/\//g,'-')}`);
    if (!dotEl) return;
    const hasFb = Array.isArray(food.rdFeedbacks) ? food.rdFeedbacks.length > 0 : !!food.rdFeedback;
    const done = food.rdFeedbackDone;
    if (done) {
      dotEl.style.background = '#22c55e';
      dotEl.title = '營養師已完成回饋';
    } else if (hasFb) {
      dotEl.style.background = '#0d9488';
      dotEl.title = '有新回饋';
    } else if (food.hasData || food.notified) {
      dotEl.style.background = '#f59e0b';
      dotEl.title = '已上傳';
    }
  });
  // 如果現在在飲食日記頁，更新回饋泡泡
  if (currentFoodDay) {
    const feedbackArea = document.getElementById('rd-feedback-area');
    if (feedbackArea) {
      const food = gs(`food_${userId}_${currentFoodDay}`);
      if (food) feedbackArea.innerHTML = renderFeedbackBubbles(food);
    }
  }
}
function startRealtimeSync(userId) {
  if (_realtimeChannel) return;
  try {
    // 使用 Supabase Realtime via WebSocket
    const wsUrl = `${SB_URL.replace('https','wss')}/realtime/v1/websocket?apikey=${SB_KEY}&vsn=1.0.0`;
    const ws = new WebSocket(wsUrl);
    ws.onopen = () => {
      ws.send(JSON.stringify({ topic: 'realtime:public:cd', event: 'phx_join', payload: {}, ref: '1' }));
    };
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.event === 'postgres_changes' || msg.event === 'INSERT' || msg.event === 'UPDATE') {
          const record = msg.payload?.record || msg.payload?.new;
          if (record?.key && record.key.startsWith(`food_${userId}`)) {
            _cache[record.key] = record.value;
            try { localStorage.setItem('cd_' + record.key, JSON.stringify(record.value)); } catch {}
            updateInboxBadge();
            updateFoodStatusDots(userId);
          }
          if (record?.key?.startsWith(`inbox_${userId}`)) {
            _cache[record.key] = record.value;
            try { localStorage.setItem('cd_' + record.key, JSON.stringify(record.value)); } catch {}
            updateInboxBadge();
            if (currentPage === 'home') document.getElementById('main-content').innerHTML = renderHome();
          }
        }
      } catch(e) {}
    };
    _realtimeChannel = ws;
  } catch(e) { console.warn('Realtime init failed:', e.message); }
}
</script>

<script>
// ══════════ DATA ══════════
const USERS = {

};

const DEFAULT_GOALS = {

    { text: '每天吃 3 份蔬菜', done: false },
    { text: '每天吃一份水果', done: false },
    { text: '一週運動三天（至少 30 分鐘）', done: false }
  ],
  2: [], 3: [], 4: []
};

// DEFAULT_PROGRESS 改為動態產生，依照課程週數自動計算（不寫死四週）
function getDefaultProgress(totalWeeks) {
  return Array.from({ length: totalWeeks }, (_, i) => ({
    week: `W${i+1}`, weight: null, fat: null, waist: null, muscle: null
  }));
}

// Weekly nutritionist plan (set by RD, read-only for student)
// Weekly plans are set by RD, default empty
const DEFAULT_WEEKLY_PLANS = {};

const MATERIALS = [];

// Menus are set by RD, default empty
const DEFAULT_MENUS = {};

// Build course dates dynamically from currentUser.start (set after login)
// Format: M/D for each day in 29-day course
// Build course dates from start to end (inclusive), every day
function buildCourseDates(startStr, endStr) {
  const parseDate = str => {
    if (!str) return null;
    const p = str.replace(/-/g,'/').split('/');
    if (p.length === 3) return new Date(+p[0], +p[1]-1, +p[2]);
    if (p.length === 2) return new Date(2026, +p[0]-1, +p[1]);
    return null;
  };
  const base = parseDate(startStr) || new Date(2026, 4, 25);
  const end  = parseDate(endStr);
  if (isNaN(base.getTime())) return [];
  const dates = [];
  for (let i = 0; i < 366; i++) {
    const d = new Date(base); d.setDate(base.getDate() + i);
    if (end && d > end) break;
    if (!end && i >= 29) break;
    dates.push(`${d.getMonth()+1}/${d.getDate()}`);
  }
  return dates;
}

// COURSE_DATES rebuilt on login from currentUser.start + end
let COURSE_DATES = buildCourseDates('2026/05/25', '2026/06/22');

// Group dates into weeks (7 days each)
function buildWeekGroups(dates) {
  const groups = [];
  for (let w = 0; w * 7 < dates.length; w++) {
    const chunk = dates.slice(w*7, (w+1)*7);
    if (!chunk.length) break;
    groups.push({ label: `W${w+1} ${chunk[0]}–${chunk[chunk.length-1]}`, dates: chunk });
  }
  return groups;
}

// ══════════ STATE ══════════
let currentUser = null;
let currentPage = 'home';
let currentFoodDay = null;
let currentGoalWeek = 1;
let currentProgressWeek = null;
let currentMatTab = 'courses';
let currentFoodCat = null; // null = category list, 'food_grain' etc = gallery view
let currentMenuPeriod = 1;

// ══════════ STORAGE ══════════
// gs() and ss() are defined in <head> via Firebase SDK

// ══════════ AUTH ══════════
function togglePw() {
  const input = document.getElementById('login-pw');
  const btn = document.getElementById('pw-toggle');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '隱藏';
  } else {
    input.type = 'password';
    btn.textContent = '顯示';
  }
}

async function findUser(id, pw) {
  // 1. 靜態測試帳號
  if (USERS[id] && USERS[id].password === pw) return { ...USERS[id], id };
  // 2. localStorage 快取（最快，已有資料就不用等 Supabase）
  try {
    const dyn = JSON.parse(localStorage.getItem('cd_dynuser_' + id));
    if (dyn && dyn.password === pw) return { ...dyn, id };
  } catch(e) {}
  // 3. 查 Supabase（第一次登入或快取沒有時）
  try {
    const res = await Promise.race([
      fetch(`${SB_URL}/rest/v1/cd?key=eq.dynuser_${encodeURIComponent(id)}&select=value`, { headers: SB_HDRS }),
      new Promise((_, r) => setTimeout(() => r(new Error('t')), 3000))
    ]);
    if (res.ok) {
      const rows = await res.json();
      if (rows[0]?.value?.password === pw) {
        // 寫入 localStorage 供下次快速登入
        try { localStorage.setItem('cd_dynuser_' + id, JSON.stringify(rows[0].value)); } catch(e) {}
        return { ...rows[0].value, id };
      }
    }
  } catch(e) {}
  return null;
}

async function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value;
  const keep = document.getElementById('keep-login').checked;
  const loginBtn = document.querySelector('.btn-primary');
  if (loginBtn) { loginBtn.textContent = '登入中...'; loginBtn.disabled = true; }
  const u = await findUser(id, pw);
  if (loginBtn) { loginBtn.textContent = '登入'; loginBtn.disabled = false; }
  if (u) {
    currentUser = u;
    document.getElementById('login-error').style.display = 'none';
    // 永遠維持登入（除非使用者主動登出）
    localStorage.setItem('cd_autologin', JSON.stringify({ id, pw }));
    // 立即啟動 App，背景同步（不讓使用者等待）
    preloadLocalCache();
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'none';
    launchApp();
    // 背景同步 Supabase，完成後靜默更新畫面
    setTimeout(async () => {
      try {
        await warmCache(id);
        // 靜默刷新當前頁
        if (document.getElementById('main-content')) renderPage();
        updateInboxBadge();
      } catch(e) {}
    }, 400);
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function launchApp() {
  // 讓 OneSignal handler 能拿到 userId
  window._currentUserId = currentUser?.id;
  window._SB_URL = SB_URL;
  window._SB_KEY = SB_KEY;
  // 請求推播權限
  if (window.OneSignal) {
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    window.OneSignalDeferred.push(async (OneSignal) => {
      try { await OneSignal.Notifications.requestPermission(); } catch(e) {}
      // 儲存 player ID
      const playerId = OneSignal.User.PushSubscription.id;
      if (playerId && currentUser?.id) {
        const key = 'onesignal_' + currentUser.id;
        await fetch(`${SB_URL}/rest/v1/cd`, {
          method: 'POST',
          headers: { ...SB_HDRS, 'Prefer': 'resolution=merge-duplicates' },
          body: JSON.stringify({ key, value: { playerId, userId: currentUser.id }, updated_at: new Date().toISOString() })
        });
      }
    });
  }
  const startDate = currentUser.start || '2026/05/25';
  const endDate   = currentUser.end   || null;
  COURSE_DATES.length = 0;
  buildCourseDates(startDate, endDate).forEach(d => COURSE_DATES.push(d));

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('topbar-name').textContent = currentUser.name + ' 學員';

  startRealtimeSync(currentUser.id);

  setInterval(async () => {
    try {
      const prevData = currentFoodDay ? JSON.stringify(gs(`food_${currentUser.id}_${currentFoodDay}`)) : null;
      await warmCache(currentUser.id);
      updateInboxBadge();
      if (currentFoodDay) {
        const newData = JSON.stringify(gs(`food_${currentUser.id}_${currentFoodDay}`));
        if (newData !== prevData) {
          document.getElementById('main-content').innerHTML = renderFoodEntry(currentFoodDay);
          showToast('💬 營養師有新回饋！');
        }
      }
    } catch(e) {}
  }, 15000);

  showPage('home');
  setTimeout(updateInboxBadge, 500);
}

function doLogout() {
  localStorage.removeItem('cd_autologin');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pw').type = 'password';
  document.getElementById('pw-toggle').textContent = '顯示';
  currentUser = null;
  document.getElementById('login-id').value = '';
  document.getElementById('login-pw').value = '';
  document.getElementById('keep-login').checked = false;
  // Clear cache on logout
  Object.keys(_cache).forEach(k => delete _cache[k]);
  // 清除增量同步時間戳
  try {
    for (let i = localStorage.length - 1; i >= 0; i--) {
      const k = localStorage.key(i);
      if (k && k.startsWith('cd_last_sync_')) localStorage.removeItem(k);
    }
  } catch(e) {}
}

// Auto-login check on page load
(function checkAutoLogin() {
  setTimeout(async () => {
    try {
      const saved = JSON.parse(localStorage.getItem('cd_autologin'));
      if (saved && saved.id && saved.pw) {
        const u = await findUser(saved.id, saved.pw);
        if (u) {

          // 立即啟動，背景同步
          preloadLocalCache();
          document.getElementById('loading-screen').style.display = 'none';

          setTimeout(async () => {
            try {
              await warmCache(saved.id);
              if (document.getElementById('main-content')) renderPage();
              updateInboxBadge();
            } catch(e) {}

          return;
        }
      }
    } catch(e) {}
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }, 800);
})();

function showPage(page) {

  const t = document.getElementById('toast');

async function syncClientData() {
  const btn = document.querySelector('[onclick="syncClientData()"]');
  if (btn) { btn.style.opacity = '0.5'; btn.textContent = '🔄 同步中…'; }
  try {
    const userId = currentUser.id;
    // 手動同步：清除增量時間戳，強制完整同步
    localStorage.removeItem('cd_last_sync_' + userId);
    await warmCache(userId);
    if (btn) { btn.style.opacity = ''; btn.textContent = '🔄 同步資料'; }
    showToast('✅ 資料已同步！');
    // 重新渲染當前頁面，讓營養師回覆立即顯示
    if (currentFoodDay) {
      document.getElementById('main-content').innerHTML = renderFoodEntry(currentFoodDay);

      renderPage();

  } catch(e) {
    if (btn) { btn.style.opacity = ''; btn.textContent = '🔄 同步資料'; }
    console.error('Sync error:', e);
    showToast('⚠️ 同步失敗：' + (e.message || '請檢查網路'));
  }
}

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}_${d.getMonth()+1}_${d.getDate()}`;
}

function getDailyGoals(userId, week) {
  const today = getTodayKey();
  return gs(`daily_goals_${userId}_${week}_${today}`) || [];
}

function updateInboxBadge() {
  const msgs = gs(`inbox_${currentUser.id}`) || [];
  const unread = msgs.filter(m => !m.read).length;

function renderFoodList() {
  const today = new Date();
  const todayStr = `${today.getMonth()+1}/${today.getDate()}`;
  const wGroups = buildWeekGroups(COURSE_DATES);

  // Dynamic week grouping — 7 days per week, last week may be shorter
  const weekDates = [];
  for (let w = 0; w * 7 < COURSE_DATES.length; w++) {
    weekDates.push(COURSE_DATES.slice(w * 7, (w + 1) * 7));
  }
  const weekLabels = weekDates.map((chunk, w) =>
    `第${['一','二','三','四','五','六','七','八'][w] || (w+1)}週（${chunk[0]}–${chunk[chunk.length-1]}）`
  );

  let html = '<div class="page-title">飲食紀錄</div>';
  weekDates.forEach((wdates, wi) => {
    html += `<div class="week-header">${weekLabels[wi]}</div>`;
    wdates.forEach(d => {
      const saved = gs(`food_${currentUser.id}_${d}`) || null;
      const isToday = d === todayStr;
      let icon = '—';
      if (saved && saved.notified) icon = '✅';
      else if (saved && saved.hasData) icon = '📝';
      const cls = isToday ? 'day-item' : 'day-item';
      html += `<div class="${cls}" onclick="openFoodDay('${d}')" style="${isToday ? 'border-color:var(--primary);background:var(--primary-light)' : ''}">
        <div style="font-size:18px;width:28px;text-align:center;flex-shrink:0">${icon}</div>
        <div class="day-item-date" style="${isToday ? 'color:var(--primary-dark)' : ''}">
          ${d}${isToday ? ' <span style="font-size:12px;font-weight:600;color:var(--primary)">(今天)</span>' : ''}
        </div>
        <div class="day-item-arrow">›</div>
      </div>`;
    });
  });

  return html;
}

function openFoodDay(day) {
  currentFoodDay = day;
  // 打開當天就標記已讀，紅點消失
  const key = `food_${currentUser.id}_${day}`;
  const existing = gs(key);
  if (existing) {
    existing.stuReadAt = new Date().toISOString();
    ss(key, existing);
  }
  document.getElementById('main-content').innerHTML = renderFoodEntry(day);
}

function backToList() {
  currentFoodDay = null;

}

function homeToggleGoal(idx, curWeek) {
  const userId = currentUser.id;
  const today = getTodayKey();
  const goals = gs(`goals_${userId}_${curWeek}`) || [];
  const dailyDone = gs(`daily_goals_${userId}_${curWeek}_${today}`) || [];
  const newDone = [...dailyDone];
  newDone[idx] = !newDone[idx];
  ss(`daily_goals_${userId}_${curWeek}_${today}`, newDone);

// ── 學員回覆營養師 ──
function sendStudentReply(day) {
  const ta = document.getElementById('student-reply-input');
  const text = ta?.value?.trim();
  if (!text) { showToast('請輸入回覆內容'); return; }
  const key = `food_${currentUser.id}_${day}`;
  const existing = gs(key) || {};
  existing.stuReadAt = new Date().toISOString();
  const replies = Array.isArray(existing.studentReplies) ? existing.studentReplies : [];
  replies.push({ text, at: new Date().toISOString() });
  existing.studentReplies = replies;
  ss(key, existing);
  ta.value = '';
  showToast('✅ 已送出回覆！');
  // 通知營養師
  const rdId = currentUser.rd || 'tingxuan';
  sendPushToRd(rdId, `💬 ${currentUser.name} 回覆了你的留言`, `${currentUser.name} 針對你的回饋留言囉，快去看看！`);
  // 重新渲染
  document.getElementById('main-content').innerHTML = renderFoodEntry(day);
}

      '</div>';
  }

  return '<div class="page-title">身體數值追蹤</div>' +
    '<div class="notice">💬 每週三填寫本週數值，填完請通知營養師！</div>' +

      '<table class="body-table">' +

function parseCpvfdoBadges(str) {
  if (!str) return '';
  const cats = ['C','P','V','F','D','O'];
  const labels = {C:'全穀',P:'豆魚蛋肉',V:'蔬菜',F:'水果',D:'乳品',O:'油脂'};
  const bg = {C:'#fef3c7',P:'#ffe4e6',V:'#dcfce7',F:'#fce7f3',D:'#e0f2fe',O:'#f5f3ff'};
  const tc = {C:'#92400e',P:'#9f1239',V:'#166534',F:'#9d174d',D:'#0369a1',O:'#5b21b6'};
  return str.split('｜').map(s => {
    const l = s.trim().charAt(0);
    if (!cats.includes(l)) return '';
    return '<span style="background:'+bg[l]+';color:'+tc[l]+';font-size:11px;font-weight:700;padding:2px 7px;border-radius:8px">'+l+' '+labels[l]+': '+s.trim().slice(1).trim()+'</span>';
  }).filter(Boolean).join('');
}

function renderGoalAchievement() {
  const wGroups = buildWeekGroups(COURSE_DATES);
  const totalWeeks = wGroups.length || 1;
  if (currentGoalWeek > totalWeeks) currentGoalWeek = 1;

  const tabs = Array.from({length: totalWeeks}, (_, i) => i+1).map(w =>
    `<button class="week-tab-btn ${w === currentGoalWeek ? 'active' : ''}" onclick="currentGoalWeek=${w};document.getElementById('main-content').innerHTML=renderGoalAchievement()">第 ${w} 週</button>`
  ).join('');

  const goals = gs(`goals_${currentUser.id}_${currentGoalWeek}`) || [];
  const today = getTodayKey();
  const dailyDone = gs(`daily_goals_${currentUser.id}_${currentGoalWeek}_${today}`) || [];
  const doneToday = goals.filter((_, i) => dailyDone[i]).length;

  const goalItems = goals.length ? goals.map((g, i) => `
    <div class="goal-item" style="align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-100)">
      <div class="goal-check ${dailyDone[i] ? 'checked' : ''}" onclick="toggleDailyGoal(${i})" style="flex-shrink:0;margin-top:2px"></div>
      <div style="flex:1">
        <div class="goal-text ${dailyDone[i] ? 'done' : ''}" style="font-size:14px">${g.text}</div>
        <div style="font-size:11px;color:var(--gray-400);margin-top:2px">每天做到就打勾，每天凌晨自動歸零</div>
      </div>
    </div>`).join('') : `<div style="text-align:center;padding:24px 0;color:var(--gray-400);font-size:14px">本週目標尚未設定<br>請等待營養師更新</div>`;

  const wg = wGroups[currentGoalWeek - 1];
  const weekDates = wg ? wg.dates : [];
  const achievedDays = weekDates.filter(dateStr => {
    const [m, d] = dateStr.split('/');
    const dt = new Date(new Date().getFullYear(), m-1, d);
    if (dt > new Date()) return false;
    const dk = `${dt.getFullYear()}_${dt.getMonth()+1}_${dt.getDate()}`;
    const dd = gs(`daily_goals_${currentUser.id}_${currentGoalWeek}_${dk}`) || [];
    return goals.length > 0 && goals.every((_, i) => dd[i]);
  }).length;
  const weekPct = Math.round(achievedDays / 7 * 100);

  const dayRows = weekDates.map(dateStr => {
    const [m, d] = dateStr.split('/');
    const dt = new Date(new Date().getFullYear(), m-1, d);
    const dayKey = `${dt.getFullYear()}_${dt.getMonth()+1}_${dt.getDate()}`;
    const dayDone = gs(`daily_goals_${currentUser.id}_${currentGoalWeek}_${dayKey}`) || [];
    const dayCount = goals.filter((_, i) => dayDone[i]).length;
    const allDone = goals.length > 0 && dayCount === goals.length;
    const isToday = dayKey === today;
    const isFuture = dt > new Date();
    return `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--gray-100)">
      <div style="font-size:18px">${allDone ? '✅' : isFuture ? '⬜' : goals.length === 0 ? '—' : '○'}</div>
      <div style="flex:1;font-size:13px;font-weight:${isToday ? '700' : '400'};color:${isToday ? 'var(--primary-dark)' : 'var(--gray-600)'}">
        週${['日','一','二','三','四','五','六'][dt.getDay()]} ${dateStr}${isToday ? '（今天）' : ''}
      </div>
      <div style="font-size:12px;color:${allDone ? 'var(--primary)' : 'var(--gray-400)'}">
        ${isFuture ? '—' : goals.length ? `${dayCount}/${goals.length}` : '—'}
      </div>
    </div>`;
  });

  return `
  <button class="back-btn" onclick="document.getElementById('main-content').innerHTML=renderHome()">‹ 返回首頁</button>
  <div class="page-title">每週小目標達成率</div>

    <div class="card-title">🎯 第 ${currentGoalWeek} 週目標（今日 ${doneToday}/${goals.length || '?'} 項完成）</div>
    ${goalItems}
    ${goals.length ? `<div style="margin-top:8px;font-size:12px;color:var(--gray-400)">💡 每天做到就打勾，每天凌晨 00:00 自動歸零！</div>` : ''}
  </div>

    <div class="card-title">📈 本週 7 天達成率
      <span style="font-size:13px;font-weight:400;color:var(--gray-500);margin-left:8px">${achievedDays}/7 天（${weekPct}%）</span>
    </div>
    <div style="background:var(--gray-200);height:8px;border-radius:4px;overflow:hidden;margin-bottom:14px">
      <div style="background:var(--primary);height:100%;width:${weekPct}%;border-radius:4px;transition:width 0.4s"></div>
    </div>
    ${dayRows.join('')}

}

      if (!cats.includes(l)) return '';
      return `<span style="background:${bg[l]};color:${tc[l]};font-size:11px;font-weight:700;padding:2px 7px;border-radius:8px">${l} ${labels[l]}: ${s.trim().slice(1).trim()}</span>`;

  }

  const weekDates = wg ? wg.dates : [];

    const dd = gs(`daily_goals_${currentUser.id}_${currentGoalWeek}_${dk}`) || [];
    return goals.length > 0 && goals.every((_, i) => dd[i]);
  }).length;
  const weekPct = Math.round(achievedDays / 7 * 100);

  return `

        <span style="font-size:13px;color:var(--gray-700)">${plan.date}</span>
      </div>` : ''}
      ${plan.calories ? `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--gray-100)">
        <span style="font-size:13px;font-weight:600;color:var(--gray-500);width:70px;flex-shrink:0">熱量設定</span>
        <span style="font-size:16px;font-weight:700;color:var(--primary)">${plan.calories}</span>
      </div>` : ''}
      ${plan.weight ? `<div style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--gray-100)">
        <span style="font-size:13px;font-weight:600;color:var(--gray-500);width:70px;flex-shrink:0">本週體重</span>
        <span style="font-size:13px;color:var(--gray-700)">${curProg.weight ? curProg.weight + ' kg（目標 ' + plan.weight + ' kg）' : plan.weight + ' kg'}</span>
      </div>` : ''}
      ${plan.fat ? `<div style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--gray-100)">
        <span style="font-size:13px;font-weight:600;color:var(--gray-500);width:70px;flex-shrink:0">本週體脂</span>
        <span style="font-size:13px;color:var(--gray-700)">${curProg.fat ? curProg.fat + ' %（目標 ' + plan.fat + ' %）' : plan.fat + ' %'}</span>
      </div>` : ''}
      ${plan.waist ? `<div style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--gray-100)">
        <span style="font-size:13px;font-weight:600;color:var(--gray-500);width:70px;flex-shrink:0">目標腰圍</span>
        <span style="font-size:13px;color:var(--gray-700)">${plan.waist} cm</span>
      </div>` : ''}
      ${plan.session ? `<div style="display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--gray-100)">
        <span style="font-size:13px;font-weight:600;color:var(--gray-500);width:70px;flex-shrink:0">視訊課程</span>
        <span style="font-size:13px;color:var(--teal);font-weight:600">📅 ${plan.session}</span>
      </div>` : ''}
      ${plan.total ? `<div style="background:var(--primary-light);border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;font-weight:700;color:var(--primary-dark)">整天合計：${plan.total}</div>` : ''}
      ${hasMeals ? `
        <div style="font-size:12px;font-weight:700;color:var(--gray-500);margin-bottom:6px">整日份數分配</div>
        ${plan.breakfast ? `<div style="padding:6px 0;border-bottom:1px solid var(--gray-100)"><span style="font-size:12px;font-weight:600;color:var(--gray-500);margin-right:6px">早餐</span><span style="display:inline-flex;flex-wrap:wrap;gap:3px">${parseCpvfdo(plan.breakfast)}</span></div>` : ''}
        ${plan.lunch ? `<div style="padding:6px 0;border-bottom:1px solid var(--gray-100)"><span style="font-size:12px;font-weight:600;color:var(--gray-500);margin-right:6px">午餐</span><span style="display:inline-flex;flex-wrap:wrap;gap:3px">${parseCpvfdo(plan.lunch)}</span></div>` : ''}
        ${plan.dinner ? `<div style="padding:6px 0;border-bottom:1px solid var(--gray-100)"><span style="font-size:12px;font-weight:600;color:var(--gray-500);margin-right:6px">晚餐</span><span style="display:inline-flex;flex-wrap:wrap;gap:3px">${parseCpvfdo(plan.dinner)}</span></div>` : ''}

  </div>

  ${plan.exercise ? `<div class="card">

  </div>` : ''}

}

function toggleDailyGoal(i) {
  const goals = gs(`goals_${currentUser.id}_${currentGoalWeek}`) || [];
  if (!goals[i]) return;
  const today = getTodayKey();
  const key = `daily_goals_${currentUser.id}_${currentGoalWeek}_${today}`;
  const dailyDone = gs(key) || [];
  dailyDone[i] = !dailyDone[i];
  ss(key, dailyDone);
  // 如果是從每週小目標達成率頁面點的，留在那個頁面
  const el = document.getElementById('main-content');
  if (el) {
    const html = el.innerHTML;
    if (html.includes('每週小目標達成率')) {
      el.innerHTML = renderGoalAchievement();
    } else {
      el.innerHTML = renderGoals();
    }
  }
  updateInboxBadge();
}

function toggleGoal(i) { toggleDailyGoal(i); } // backward compat

function switchGoalWeek(w) {
  currentGoalWeek = w;
  document.getElementById('main-content').innerHTML = renderGoals();
}

// ── INBOX ──
function renderInbox() {
  const msgs = gs(`inbox_${currentUser.id}`) || [];
  // Mark all as read when opening inbox
  if (msgs.some(m => !m.read)) {
    msgs.forEach(m => m.read = true);
    ss(`inbox_${currentUser.id}`, msgs);
    updateInboxBadge();
  }
  const sorted = [...msgs].reverse();
  const iconMap = { feedback: '🥦', weekplan: '📋', bodytrack: '⚖️', menu: '🥗', materials: '📚', general: '📬' };
  const actionMap = {
    feedback: (m) => `goToFeedbackDay('${m.day || ''}')`,
    weekplan: () => `showPage('goals')`,
    bodytrack: () => `showPage('body')`,
    menu: () => `showPage('menu')`,
    materials: () => `showPage('materials')`,
    general: () => ``
  };
  return `
  <div class="page-title">📬 收件夾</div>
  ${sorted.length === 0 ? `<div class="card"><div style="text-align:center;padding:24px 0;color:var(--gray-400);font-size:14px">尚無通知<br>當營養師有新回饋或更新時，這裡會收到通知！</div></div>` : ''}
  ${sorted.map((m, i) => `
    <div class="card" style="cursor:${m.type && m.type !== 'general' ? 'pointer' : 'default'};border-left:3px solid ${m.read ? 'var(--gray-200)' : '#3b82f6'};padding-left:14px"
      onclick="${actionMap[m.type || 'general']?.(m) || ''}">
      <div style="display:flex;align-items:flex-start;gap:12px">
        <div style="font-size:24px;flex-shrink:0">${iconMap[m.type || 'general'] || '📬'}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:14px;color:var(--gray-800)">${m.title || '通知'}</div>
          <div style="font-size:13px;color:var(--gray-600);margin-top:3px;line-height:1.5">${m.body || ''}</div>
          <div style="font-size:11px;color:var(--gray-400);margin-top:6px">${m.at ? new Date(m.at).toLocaleString('zh-TW') : ''}</div>
        </div>
        ${m.type && m.type !== 'general' ? '<div style="color:var(--gray-400);font-size:16px;align-self:center">›</div>' : ''}
      </div>
    </div>`).join('')}`;
}

function goToFeedbackDay(day) {
  if (!day) { showPage('food'); return; }
  // Mark fbRead for this day
  const f = gs(`food_${currentUser.id}_${day}`);
  if (f) { f.fbRead = true; ss(`food_${currentUser.id}_${day}`, f); }
  currentFoodDay = day;
  // Find which week contains this day
  const wGroups = buildWeekGroups(buildCourseDates(currentUser.start, currentUser.end));
  const wi = wGroups.findIndex(wg => wg.dates.includes(day));
  const curWeek = wi >= 0 ? wi + 1 : 1;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-food')?.classList.add('active');
  document.getElementById('main-content').innerHTML = renderFoodEntry(day);
  window.scrollTo(0, 0);
}

  const menu = allMenus[currentMenuPeriod];

  const periodTabs = periods.map(p => `
    <button class="period-tab-btn ${p === currentMenuPeriod ? 'active' : ''}" onclick="switchMenuPeriod(${p})">第 ${p} 期</button>
  `).join('');

  let daysHTML = '';
  if (!menu || !menu.days || menu.days.length === 0) {
    daysHTML = `<div class="empty-state"><div class="empty-icon">🥗</div><p>本期菜單尚未提供<br>請等待營養師上傳！</p></div>`;
  } else {
    daysHTML = menu.days.map(d => `
      <div class="menu-day-row">
        <div class="menu-day-name">週${d.name}</div>

          ${d.breakfast ? `<div><span class="menu-meal-tag">早</span>${d.breakfast}</div>` : ''}

          ${d.dinner    ? `<div style="margin-top:5px"><span class="menu-meal-tag">晚</span>${d.dinner}</div>` : ''}
          ${d.snack     ? `<div style="margin-top:5px"><span class="menu-meal-tag" style="background:var(--amber-light);color:#92400e">點</span>${d.snack}</div>` : ''}
          ${d.cpvfdo   ? `<div style="margin-top:6px;font-size:11px;color:var(--gray-500);background:var(--gray-50);padding:4px 8px;border-radius:6px">📊 ${d.cpvfdo}</div>` : ''}
        </div>
      </div>`).join('');
  }

  return `

  <div class="notice">🥗 根據你的飲食喜好與目標量身規劃，每期更新一次</div>

function renderProgressDetail(week) {

  const p = prog[week - 1] || {};
  const plan = gs(`wplan_${currentUser.id}_${week}`) || {};
  const goals = gs(`goals_${currentUser.id}_${week}`) || [];

  function parseMealLine(str) {
    if (!str) return null;
    const badges = ['C','P','V','F','D','O'];
    const parts = str.split('｜').map(s => s.trim()).filter(Boolean);
    return `<div class="cpvfdo-badges">${parts.map(part => {
      const letter = part.charAt(0);
      if (badges.includes(letter)) return `<span class="badge ${letter}">${part}</span>`;
      return `<span class="badge">${part}</span>`;
    }).join('')}</div>`;
  }

  // Calculate daily total CPVFDO from all meals
  function calcDailyTotal() {
    const keys = ['C','P','V','F','D','O'];
    const totals = {C:0,P:0,V:0,F:0,D:0,O:0};
    const mealStrings = [plan.breakfast, plan.lunch, plan.dinner, plan.snack].filter(Boolean);
    mealStrings.forEach(str => {
      str.split('｜').forEach(part => {
        const t = part.trim();
        const letter = t.charAt(0);
        if (keys.includes(letter)) {
          const num = parseFloat(t.replace(letter,'').trim());
          if (!isNaN(num)) totals[letter] += num;
        }
      });
    });
    const hasAny = Object.values(totals).some(v => v > 0);
    if (!hasAny) return null;
    return keys.map(k => totals[k] > 0 ? `${k} ${totals[k] % 1 === 0 ? totals[k] : totals[k].toFixed(1)}` : null).filter(Boolean).join('｜');
  }

  const hasMeals = plan.breakfast || plan.lunch || plan.dinner || plan.snack;
  const dailyTotal = calcDailyTotal();

  return `
  <button class="back-btn" onclick="backToBody()">‹ 返回身體數值</button>
  <div class="page-title">W${week} 本週計畫</div>

  <div class="card">

      <div class="prog-row"><span class="prog-row-label">體重</span><span class="prog-row-val">${p.weight ? p.weight + ' kg' : '尚未記錄'}</span></div>
      <div class="prog-row"><span class="prog-row-label">體脂</span><span class="prog-row-val">${p.fat ? p.fat + ' %' : '尚未記錄'}</span></div>
      <div class="prog-row"><span class="prog-row-label">腰圍</span><span class="prog-row-val">${p.waist ? p.waist + ' cm' : '尚未記錄'}</span></div>
    </div>

    <div class="divider" style="margin:4px 0 14px"></div>

    <div class="prog-section">
      <div class="prog-section-title">🍽️ 餐次分配（C 全穀｜P 豆魚蛋肉｜V 蔬菜｜F 水果｜D 乳品｜O 油脂）</div>
      ${hasMeals ? `
      <div class="meal-dist-grid">
        <div class="meal-dist-item">
          <div class="meal-dist-label">早餐</div>
          ${plan.breakfast ? parseMealLine(plan.breakfast) : '<div class="meal-dist-val">---</div>'}
        </div>
        <div class="meal-dist-item">
          <div class="meal-dist-label">午餐</div>
          ${plan.lunch ? parseMealLine(plan.lunch) : '<div class="meal-dist-val">---</div>'}

          ${plan.dinner ? parseMealLine(plan.dinner) : '<div class="meal-dist-val">---</div>'}

        </div>
      </div>
      ${dailyTotal ? `
      <div style="margin-top:12px;padding:10px 12px;background:var(--green-light);border-radius:8px;border-left:3px solid var(--green)">
        <div style="font-size:11px;font-weight:700;color:var(--primary-dark);margin-bottom:5px">📊 整天份數合計</div>

function handleImgUpload(event, day, mealKey) {
  const files = Array.from(event.target.files);
  if (!files.length) return;
  event.target.value = '';
  showToast('📤 壓縮並上傳中…');
  let done = 0;
  const urls = [];

  files.forEach(file => {
    const img = new Image();
    const blobUrl = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 900;
      let w = img.width, h = img.height;
      if (w > h && w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      else if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(blobUrl);
      canvas.toBlob(async (blob) => {
        try {
          const url = await uploadPhoto(blob, currentUser.id, day, mealKey);
          urls.push(url);
        } catch(e) {
          showToast('⚠️ 照片上傳失敗，請確認網路後重試');
        }
        done++;
        if (done === files.length) appendImgs(day, mealKey, urls);
      }, 'image/jpeg', 0.75);
    };
    img.onerror = () => {
      const reader = new FileReader();
      reader.onload = e => { urls.push(e.target.result); done++; if (done === files.length) appendImgs(day, mealKey, urls); };
      reader.readAsDataURL(file);
    };
    img.src = blobUrl;
  });
}

function appendImgs(day, mealKey, newImgs) {
  if (!newImgs.length) return;
  const existing = gs(`food_${currentUser.id}_${day}`) || {};
  const key = mealKey + '_imgs';

  ss(`food_${currentUser.id}_${day}`, existing);

  showToast(`✅ 已上傳 ${newImgs.length} 張照片`);
}

// ── ENCY PREVIEW — fullscreen in-app lightbox with left/right navigation ──
let _lbItems = [];   // image items currently in lightbox context
let _lbIdx = 0;      // current index within _lbItems

function openEncyPreview(idx) {
  const now = Date.now();
  const ONE_YEAR = 365 * 24 * 60 * 60 * 1000;
  const items = (gs(`ency_${currentUser.id}`) || []).filter(i => !i.uploadedAt || (now - i.uploadedAt) <= ONE_YEAR);
  const item = items[idx];
  const src = item?.fileUrl || item?.fileData;
  if (!src) { showToast('此教材無附加檔案'); return; }

  if (item.fileType === 'pdf') {
    const w = window.open();
    if (w) w.document.write(`<html><body style="margin:0"><iframe src="${src}" width="100%" height="100%" style="border:none;position:fixed;inset:0"></iframe></body></html>`);
    return;
  }

  // Build sibling image list (same category, images only)
  const catKey = item.catKey || item.desc;
  const allImages = items.map((it, i) => ({ ...it, _origIdx: i }))
    .filter(it => (it.catKey || it.desc) === catKey && it.fileType === 'image' && (it.fileUrl || it.fileData));
  // If no siblings found, just show this item alone
  _lbItems = allImages.length > 0 ? allImages : [{ ...item, _origIdx: idx }];
  _lbIdx = _lbItems.findIndex(it => it._origIdx === idx);
  if (_lbIdx < 0) _lbIdx = 0;

  renderLightbox();
}

function renderLightbox() {
  document.getElementById('img-lightbox')?.remove();

  const item = _lbItems[_lbIdx];
  if (!item) return;

  const hasPrev = _lbIdx > 0;
  const hasNext = _lbIdx < _lbItems.length - 1;

  const overlay = document.createElement('div');
  overlay.id = 'img-lightbox';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;touch-action:pan-y;';

  overlay.innerHTML = `
    <button onclick="document.getElementById('img-lightbox').remove()"
      style="position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:32px;cursor:pointer;padding:8px;line-height:1;z-index:2">✕</button>

    ${hasPrev ? `<button onclick="lbNav(-1)"
      style="position:absolute;left:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:32px;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;backdrop-filter:blur(4px)">‹</button>` : ''}

    ${hasNext ? `<button onclick="lbNav(1)"
      style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:32px;width:48px;height:48px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;backdrop-filter:blur(4px)">›</button>` : ''}

    <img src="${item.fileUrl || item.fileData}" style="max-width:88vw;max-height:82vh;object-fit:contain;border-radius:4px;user-select:none" draggable="false">

    <div style="color:rgba(255,255,255,0.65);font-size:12px;margin-top:10px;display:flex;align-items:center;gap:12px">
      <span>${item.fileName || ''}</span>
      <span style="background:rgba(255,255,255,0.15);padding:2px 8px;border-radius:10px">${_lbIdx+1} / ${_lbItems.length}</span>
    </div>`;

  // Tap outside to close
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };

  document.body.appendChild(overlay);

  // Pinch-to-zoom + pan + swipe
  const img = overlay.querySelector('img');
  let scale = 1, lastScale = 1;
  let panX = 0, panY = 0, lastPanX = 0, lastPanY = 0;
  let initDist = 0;
  let touchStartX = 0, touchStartY = 0;
  let isPinching = false;

  function applyTransform() {
    img.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    img.style.maxWidth = 'none';
    img.style.maxHeight = 'none';
    img.style.width = '88vw';
    img.style.height = 'auto';
  }

  function resetTransform() {
    scale = 1; panX = 0; panY = 0;
    img.style.transform = '';
    img.style.maxWidth = '88vw';
    img.style.maxHeight = '82vh';
    img.style.width = '';
  }

  overlay.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      isPinching = true;
      initDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      lastScale = scale;
      lastPanX = panX; lastPanY = panY;
    } else if (e.touches.length === 1) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      lastPanX = panX; lastPanY = panY;
      isPinching = false;
    }
  }, { passive: true });

  overlay.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      scale = Math.min(5, Math.max(1, lastScale * dist / initDist));
      applyTransform();
    } else if (e.touches.length === 1 && scale > 1) {
      e.preventDefault();
      panX = lastPanX + (e.touches[0].clientX - touchStartX);
      panY = lastPanY + (e.touches[0].clientY - touchStartY);
      applyTransform();
    }
  }, { passive: false });

  overlay.addEventListener('touchend', e => {
    if (isPinching) { isPinching = false; return; }
    if (scale <= 1) {
      // Swipe to navigate
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
        resetTransform();
        lbNav(dx < 0 ? 1 : -1);
      }
    }
    // Double-tap to reset
    if (scale > 1 && e.changedTouches.length === 1) {
      const now = Date.now();
      if (now - (overlay._lastTap || 0) < 300) { resetTransform(); }
      overlay._lastTap = now;
    }
  }, { passive: true });

  // Keyboard support
  overlay._keyHandler = e => {
    if (e.key === 'ArrowLeft') lbNav(-1);
    else if (e.key === 'ArrowRight') lbNav(1);
    else if (e.key === 'Escape') overlay.remove();
  };
  document.addEventListener('keydown', overlay._keyHandler);
  overlay.addEventListener('remove', () => document.removeEventListener('keydown', overlay._keyHandler));
}

function lbNav(dir) {
  const next = _lbIdx + dir;
  if (next < 0 || next >= _lbItems.length) return;
  _lbIdx = next;
  renderLightbox();
}

function openEncyPreview_course(courseIdx) {
  const course = COURSES[courseIdx];
  if (!course) return;
  const rawItems = gs(`ency_${currentUser.id}`) || [];
  const item = rawItems.find(i => i.category === 'course' && i.desc === `course_${course.num}`);
  if (!item) { showToast('課程影片即將上線，敬請期待！'); return; }
  if (item.linkUrl) { window.open(item.linkUrl, '_blank'); return; }
  if (item.fileData) {
    const w = window.open();
    if (w) w.document.write(`<html><body style="margin:0"><iframe src="${item.fileData}" width="100%" height="100%" style="border:none;position:fixed;inset:0"></iframe></body></html>`);
  }
}
</script>
